<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bg)" rx="24"/>
  
  <circle cx="1050" cy="80" r="150" fill="#3b82f6" opacity="0.1" filter="url(#glow)"/>
  <circle cx="150" cy="320" r="200" fill="#8b5cf6" opacity="0.1" filter="url(#glow)"/>
  
  <g transform="translate(600, 180)" text-anchor="middle">
    <text y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="82" fill="url(#textGrad)" letter-spacing="-2">
      CleanFiles v2
    </text>
    <text y="60" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="28" fill="#94a3b8" letter-spacing="1">
      NETTOYEUR DE FICHIERS 100% CLIENT-SIDE
    </text>
  </g>
  
  <g transform="translate(350, 280)">
    <rect x="0" y="0" width="500" height="8" rx="4" fill="#334155" />
    <rect x="0" y="0" width="300" height="8" rx="4" fill="url(#textGrad)" />
    <circle cx="300" cy="4" r="8" fill="#c084fc" filter="url(#glow)"/>
  </g>
</svg>